<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários - ADONIS</title>
</head>
<body>

    <h2>Lista de Usuários</h2>

    <!-- <a th:href="@{/usuarios/novo}">Adicionar Novo Usuário</a> -->

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Email</th>
                <th>Tipo</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="usuario : ${usuarios}">
                <td th:text="${usuario.idUsuario}"></td>

                <td th:text="${usuario.aluno != null ? usuario.aluno.nome :
                            (usuario.personalTrainer != null ? usuario.personalTrainer.nome : '---')}">
                </td>

                <td th:text="${usuario.email}"></td>
                <td th:text="${usuario.tipoUsuario}"></td>
                <td th:text="${usuario.status}"></td>
            </tr>
        </tbody>
    </table>

    <br>
    <button><a th:href="@{/}">Voltar</a></button>
</body>
</html>
