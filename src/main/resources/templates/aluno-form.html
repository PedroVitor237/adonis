<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Aluno</title>

    <link rel="stylesheet" th:href="@{/styles/style.css}">
</head>
<body>
    
    <h1 th:text="${aluno.idAluno == null} ? 'Novo Aluno' : 'Editar Aluno'"></h1>

    <form th:action="@{${aluno.idAluno == null} ? '/alunos' : '/alunos/' + ${aluno.idAluno}}"
        th:object="${aluno}"
        method="post">

        <input type="hidden" th:field="*{idAluno}"/>

        <!-- DADOS USUARIO -->
        <h3>Dados de Acessso</h3>

        <label>Email:</label>
        <input type="email" th:field="*{usuario.email}" required/>
        <br><br>

        <label>Senha:</label>
        <input type="password" th:field="*{usuario.senha}" required/>
        <br><br>

        <!-- DADOS DO ALUNO -->
        <h3>Dados do Aluno</h3>

        <label>Nome:</label>
        <input type="text" th:field="*{nome}" required/>
        <br><br>

        <button type="submit">Salvar</button>
    </form>

    <br>
    <a th:href="@{/alunos}">Voltar</a>

</body>
</html>
